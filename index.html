<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - Direct Connect</title>
    <style>
        :root {
            --bg-color: #0F172A; 
            --card-bg: #1E293B; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --buy-color: #10B981; 
            --sell-color: #EF4444; 
            --border-color: #334155; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 2rem;
            color: var(--text-main);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .delete-all-btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--sell-color);
            border: 2px solid var(--sell-color);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-all-btn:hover {
            background-color: var(--sell-color);
            color: white;
        }

        /* TOMBOL NOTIFIKASI BARU */
        .notify-btn {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3B82F6;
            border: 2px solid #3B82F6;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .notify-btn:hover {
            background-color: #3B82F6;
            color: white;
        }

        .notify-btn.active {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--buy-color);
            border-color: var(--buy-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .signal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge.BUY {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--buy-color);
            border: 1px solid var(--buy-color);
        }

        .badge.SELL {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--sell-color);
            border: 1px solid var(--sell-color);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            align-items: center;
        }

        .price-label { color: var(--text-muted); }
        .price-value { font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .price-value.buy-text { color: var(--buy-color); }
        .price-value.sell-text { color: var(--sell-color); }

        .tp-done {
            border-color: var(--buy-color);
            background-image: linear-gradient(to bottom right, var(--card-bg), rgba(16, 185, 129, 0.05));
        }

        .tp-hit-msg {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--buy-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px dashed var(--buy-color);
        }

        .delete-btn {
            margin-top: auto;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🍀 Sinyal Trading Aktif (Direct) 🍀</h1>
        <div class="action-buttons">
            <button class="delete-all-btn" onclick="hapusSemuaSinyal()">⚠️ Hapus Semua</button>
            <button id="notifyBtn" class="notify-btn" onclick="aktifkanNotifikasi()">🔔 Izinkan Notifikasi</button>
        </div>
    </div>

    <div class="grid-container" id="signalGrid">
        <div class="empty-state">Memuat data dari Supabase...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ngtyjodboetdmhcelxbi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_F8GSY-zKKGVpa7HdDXN45g_7xNK_MP4';
        const API_ENDPOINT = `${SUPABASE_URL}/rest/v1/active_signals`;
        
        const reqHeaders = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
        };

        // ==========================================
        // SISTEM MEMORI & NOTIFIKASI
        // ==========================================
        let isFirstLoad = true;
        const memorySinyal = new Map(); // Menyimpan data untuk perbandingan
        let notifAktif = false;

        function bunyikanBeep() {
            if (!notifAktif) return;
            try {
                // Menggunakan Web Audio API untuk membuat suara tanpa file MP3 eksternal
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // Nada tinggi
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime); // Volume
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.3); // Bunyi selama 0.3 detik
            } catch (e) {
                console.error("Gagal memutar suara:", e);
            }
        }

        function kirimNotif(judul, pesan) {
            if (!notifAktif || Notification.permission !== "granted") return;
            
            bunyikanBeep();
            
            // Memunculkan popup Android/Windows
            const notif = new Notification(judul, {
                body: pesan,
                icon: "https://cdn-icons-png.flaticon.com/512/2933/2933116.png" // Ikon lonceng
            });

            // Jika notifikasi diklik, buka kembali tab Vercel Anda
            notif.onclick = function() {
                window.focus();
                notif.close();
            };
        }

        async function aktifkanNotifikasi() {
            if (!("Notification" in window)) {
                alert("Browser HP Anda tidak mendukung fitur Notifikasi Web.");
                return;
            }

            // Meminta izin ke pengguna
            const permission = await Notification.requestPermission();
            const btn = document.getElementById('notifyBtn');

            if (permission === "granted") {
                notifAktif = true;
                btn.innerText = "✅ Notifikasi Aktif";
                btn.classList.add("active");
                bunyikanBeep(); // Tes suara
                alert("Notifikasi berhasil diaktifkan! Anda bisa minimize Chrome sekarang.");
            } else {
                alert("Izin notifikasi ditolak. Silakan izinkan di setelan browser.");
            }
        }

        // ==========================================
        // LOGIKA PENARIKAN DATA (FETCH)
        // ==========================================
        async function fetchSignals() {
            try {
                const response = await fetch(`${API_ENDPOINT}?select=*&order=id.desc&limit=50`, {
                    method: 'GET',
                    headers: reqHeaders
                });
                
                if (!response.ok) return;
                
                const signals = await response.json();
                
                // CEK PERUBAHAN UNTUK NOTIFIKASI
                if (isFirstLoad) {
                    // Jika baru buka web, simpan semua data ke memori diam-diam
                    signals.forEach(s => memorySinyal.set(s.id, s.is_tp_hit));
                    isFirstLoad = false;
                } else {
                    // Jika ini refresh ke-2 dst, bandingkan data baru vs data di memori
                    signals.forEach(s => {
                        if (!memorySinyal.has(s.id)) {
                            // ADA SINYAL BARU!
                            memorySinyal.set(s.id, s.is_tp_hit);
                            kirimNotif(`🚨 Sinyal Baru: ${s.signal_type}`, `Entry: ${s.entry_price} | TP: ${s.tp_price}`);
                        } else if (memorySinyal.get(s.id) === false && s.is_tp_hit === true) {
                            // ADA STATUS TP YANG BERUBAH!
                            memorySinyal.set(s.id, true);
                            kirimNotif(`🎯 TP TERSENTUH!`, `Sinyal ${s.signal_type} baru saja menyentuh Take Profit di ${s.tp_price}`);
                        }
                    });
                }

                renderSignals(signals);
            } catch (error) {
                console.error("Koneksi terputus:", error);
            }
        }

        function renderSignals(signals) {
            const grid = document.getElementById('signalGrid');
            grid.innerHTML = '';

            if (signals.length === 0) {
                grid.innerHTML = '<div class="empty-state">Tidak ada sinyal saat ini.</div>';
                return;
            }

            signals.forEach(signal => {
                const isBuy = signal.signal_type === 'BUY';
                const card = document.createElement('div');
                card.className = `signal-card ${signal.is_tp_hit ? 'tp-done' : ''}`;
                
                const parts = signal.id.split('_');
                let displayTime = signal.id;
                
                if (parts.length >= 2) {
                    const dateStr = parts[0].split('-'); 
                    const timeStr = parts[1].replace('-', ':'); 
                    if (dateStr.length === 3) {
                        displayTime = `${dateStr[2]}/${dateStr[1]}/${dateStr[0]} ${timeStr}`;
                    }
                }

                const tpStatusHtml = signal.is_tp_hit 
                    ? `<div class="tp-hit-msg">✅ TP Sudah Disentuh<br/>di harga: ${parseFloat(signal.tp_price).toFixed(2)}</div>` 
                    : '';

                card.innerHTML = `
                    <div class="card-header">
                        <span>🕒 ${displayTime}</span>
                        <span class="badge ${signal.signal_type}">${signal.signal_type}</span>
                    </div>
                    
                    ${tpStatusHtml}

                    <div class="price-row">
                        <span class="price-label">Entry Price</span>
                        <span class="price-value ${isBuy ? 'buy-text' : 'sell-text'}">
                            ${parseFloat(signal.entry_price).toFixed(2)}
                        </span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Take Profit (TP)</span>
                        <span class="price-value" style="color: #3B82F6;">
                            ${parseFloat(signal.tp_price).toFixed(2)}
                        </span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Stop Loss (SL)</span>
                        <span class="price-value" style="color: #F97316;">
                            ${parseFloat(signal.sl_price).toFixed(2)}
                        </span>
                    </div>
                    
                    <button class="delete-btn" onclick="hapusSinyal('${signal.id}')">🗑️ Hapus Manual</button>
                `;
                
                grid.appendChild(card);
            });
        }

        async function hapusSinyal(id) {
            if (!confirm(`Apakah Anda yakin ingin menghapus sinyal ini?`)) return;
            try {
                const response = await fetch(`${API_ENDPOINT}?id=eq.${id}`, { method: 'DELETE', headers: reqHeaders });
                if (response.ok) {
                    memorySinyal.delete(id); // Hapus dari memori juga
                    fetchSignals();
                } else alert("Gagal menghapus sinyal.");
            } catch (error) {
                alert("Terjadi kesalahan.");
            }
        }

        async function hapusSemuaSinyal() {
            if (!confirm("⚠️ PERINGATAN BAHAYA ⚠️\n\nApakah Anda YAKIN ingin menghapus SEMUA sinyal di layar ini? Tindakan ini tidak bisa dibatalkan!")) return;
            if (!confirm("Sekali lagi, Anda benar-benar yakin ingin membersihkan seluruh dashboard?")) return;
            try {
                const response = await fetch(`${API_ENDPOINT}?id=not.is.null`, { method: 'DELETE', headers: reqHeaders });
                if (response.ok) {
                    memorySinyal.clear(); // Bersihkan memori total
                    fetchSignals(); 
                } else alert("Gagal membersihkan database.");
            } catch (error) {
                alert("Terjadi kesalahan koneksi saat menghapus massal.");
            }
        }

        fetchSignals();
        setInterval(fetchSignals, 5000); // Mengecek database setiap 5 detik
    </script>
</body>
</html>
