<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - Direct Connect</title>
    <style>
        :root {
            --bg-color: #0F172A; 
            --card-bg: #1E293B; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --buy-color: #10B981; 
            --sell-color: #EF4444; 
            --border-color: #334155; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* PERUBAHAN: Membuat kontainer header agar tombol rapi di tengah */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 2rem;
            color: var(--text-main);
        }

        /* TAMPILAN TOMBOL HAPUS SEMUA */
        .delete-all-btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--sell-color);
            border: 2px solid var(--sell-color);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .delete-all-btn:hover {
            background-color: var(--sell-color);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .signal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .signal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.BUY {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--buy-color);
            border: 1px solid var(--buy-color);
        }

        .badge.SELL {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--sell-color);
            border: 1px solid var(--sell-color);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            align-items: center;
        }

        .price-label { color: var(--text-muted); }
        .price-value { font-family: monospace; font-weight: bold; font-size: 1.1rem; }
        .price-value.buy-text { color: var(--buy-color); }
        .price-value.sell-text { color: var(--sell-color); }

        .tp-done {
            border-color: var(--buy-color);
            background-image: linear-gradient(to bottom right, var(--card-bg), rgba(16, 185, 129, 0.05));
        }

        .tp-hit-msg {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--buy-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px dashed var(--buy-color);
        }

        .delete-btn {
            margin-top: auto;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--sell-color);
            border-color: var(--sell-color);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🍀 Sinyal Trading Aktif (Direct) 🍀</h1>
        <button class="delete-all-btn" onclick="hapusSemuaSinyal()">
            ⚠️ Hapus Semua Sinyal
        </button>
    </div>

    <div class="grid-container" id="signalGrid">
        <div class="empty-state">Memuat data dari Supabase...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ngtyjodboetdmhcelxbi.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_F8GSY-zKKGVpa7HdDXN45g_7xNK_MP4';

        const API_ENDPOINT = `${SUPABASE_URL}/rest/v1/active_signals`;
        
        const reqHeaders = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
        };

        async function fetchSignals() {
            try {
                const response = await fetch(`${API_ENDPOINT}?select=*&order=id.desc&limit=50`, {
                    method: 'GET',
                    headers: reqHeaders
                });
                
                if (!response.ok) {
                    console.warn("Gagal tarik data, mempertahankan layar lama...");
                    return;
                }
                
                const signals = await response.json();
                renderSignals(signals);
            } catch (error) {
                console.error("Koneksi terputus:", error);
            }
        }

        function renderSignals(signals) {
            const grid = document.getElementById('signalGrid');
            grid.innerHTML = '';

            if (signals.length === 0) {
                grid.innerHTML = '<div class="empty-state">Tidak ada sinyal saat ini.</div>';
                return;
            }

            signals.forEach(signal => {
                const isBuy = signal.signal_type === 'BUY';
                const card = document.createElement('div');
                card.className = `signal-card ${signal.is_tp_hit ? 'tp-done' : ''}`;
                
                const parts = signal.id.split('_');
                let displayTime = signal.id;
                
                if (parts.length >= 2) {
                    const dateStr = parts[0].split('-'); 
                    const timeStr = parts[1].replace('-', ':'); 
                    if (dateStr.length === 3) {
                        displayTime = `${dateStr[2]}/${dateStr[1]}/${dateStr[0]} ${timeStr}`;
                    }
                }

                const tpStatusHtml = signal.is_tp_hit 
                    ? `<div class="tp-hit-msg">✅ TP Sudah Disentuh<br/>di harga: ${parseFloat(signal.tp_price).toFixed(2)}</div>` 
                    : '';

                card.innerHTML = `
                    <div class="card-header">
                        <span>🕒 ${displayTime}</span>
                        <span class="badge ${signal.signal_type}">${signal.signal_type}</span>
                    </div>
                    
                    ${tpStatusHtml}

                    <div class="price-row">
                        <span class="price-label">Entry Price</span>
                        <span class="price-value ${isBuy ? 'buy-text' : 'sell-text'}">
                            ${parseFloat(signal.entry_price).toFixed(2)}
                        </span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Take Profit (TP)</span>
                        <span class="price-value" style="color: #3B82F6;">
                            ${parseFloat(signal.tp_price).toFixed(2)}
                        </span>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Stop Loss (SL)</span>
                        <span class="price-value" style="color: #F97316;">
                            ${parseFloat(signal.sl_price).toFixed(2)}
                        </span>
                    </div>
                    
                    <button class="delete-btn" onclick="hapusSinyal('${signal.id}')">🗑️ Hapus Manual</button>
                `;
                
                grid.appendChild(card);
            });
        }

        async function hapusSinyal(id) {
            if (!confirm(`Apakah Anda yakin ingin menghapus sinyal ini?`)) return;

            try {
                const response = await fetch(`${API_ENDPOINT}?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: reqHeaders
                });

                if (response.ok) {
                    fetchSignals();
                } else {
                    alert("Gagal menghapus sinyal.");
                }
            } catch (error) {
                alert("Terjadi kesalahan saat menghapus data.");
            }
        }

        // ==========================================
        // FUNGSI BARU: HAPUS SEMUA SINYAL MASSAL
        // ==========================================
        async function hapusSemuaSinyal() {
            // Peringatan pertama
            if (!confirm("⚠️ PERINGATAN BAHAYA ⚠️\n\nApakah Anda YAKIN ingin menghapus SEMUA sinyal di layar ini? Tindakan ini tidak bisa dibatalkan!")) return;
            
            // Peringatan kedua agar tidak salah pencet
            if (!confirm("Sekali lagi, Anda benar-benar yakin ingin membersihkan seluruh dashboard?")) return;

            try {
                // Trik REST API Supabase: Hapus jika 'id' tidak null (artinya hapus semua)
                const response = await fetch(`${API_ENDPOINT}?id=not.is.null`, {
                    method: 'DELETE',
                    headers: reqHeaders
                });

                if (response.ok) {
                    fetchSignals(); // Layar akan langsung bersih!
                } else {
                    alert("Gagal membersihkan database.");
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi saat menghapus massal.");
            }
        }

        fetchSignals();
        setInterval(fetchSignals, 5000);
    </script>
</body>
</html>
